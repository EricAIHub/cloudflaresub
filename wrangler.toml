name = "cloudflaresub"
main = "src/worker.js"
compatibility_date = "2026-03-06"
workers_dev = false

[routs] = [
 {pattern = "satisfaction.ccwu.cc/*",
custom_domain = true}
]

[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/sub/*"]
